name: Google Publish Signals After Deploy

on:
  push:
    branches:
      - main

jobs:
  publish-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Google API dependencies
        run: python3 -m pip install --upgrade pip google-auth google-api-python-client

      - name: Create .env for workflow
        run: |
          cat <<'EOF' > .env
          PUBLIC_GA_ID=G-LRT5BKLD8Y
          PUBLIC_LINE_URL=https://line.me/R/ti/p/%40103khwdx
          GSC_SITE_URL=sc-domain:hiroto-fire.com
          EOF

      - name: Restore Google service account file (optional)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-credentials.json
          else
            echo "GOOGLE_SERVICE_ACCOUNT_JSON secret is not set. Search Console sitemap submit will be skipped."
          fi

      - name: Build site
        run: npm run build

      - name: Wait for Cloudflare deploy and notify IndexNow (Bing)
        run: npm run seo:notify -- --wait-live --base HEAD~1 --head HEAD

      - name: Send Google publish signals
        run: npm run seo:google

      - name: Upload indexing logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: indexing-logs
          path: logs/indexing/
