<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#F4F0E8"/>
  <rect x="78" y="72" width="1044" height="531" rx="36" fill="#FFFDFC"/>
  <rect x="208" y="108" width="300" height="48" rx="24" fill="#2F6F4E"/>
  <text x="358" y="139" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#FFFDFC">地震保険 必要？</text>
  <text x="182" y="230" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="56" font-weight="700" fill="#21352D">入るべきか</text>
  <text x="182" y="310" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="56" font-weight="700" fill="#21352D">ぼくの判断</text>
  <text x="182" y="382" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="34" font-weight="700" fill="#496457">年4,144円なら残した</text>
  <rect x="738" y="168" width="286" height="320" rx="28" fill="#EAF4ED" stroke="#7BA889" stroke-width="4"/>
  <text x="881" y="232" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="700" fill="#21352D">判断の軸</text>
  <text x="786" y="296" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#21352D">・持ち家か</text>
  <text x="786" y="344" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#21352D">・家計で持てるか</text>
  <text x="786" y="392" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#21352D">・不安が軽くなるか</text>
  <rect x="182" y="472" width="356" height="78" rx="20" fill="#FFF4E8" stroke="#D08A42" stroke-width="3"/>
  <text x="360" y="520" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="700" fill="#A85A12">一般論より自分の判断軸</text>
</svg>
