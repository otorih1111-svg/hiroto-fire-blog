<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F4EFE6"/>
  <rect x="44" y="44" width="1112" height="542" rx="28" fill="#FFFDFC" stroke="#D7CBB7" stroke-width="4"/>
  <rect x="84" y="88" width="268" height="44" rx="22" fill="#2F5D50"/>
  <text x="218" y="117" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#FFFDFC">保険見直し</text>
  <text x="92" y="224" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="56" font-weight="700" fill="#21352D">無料保険相談は</text>
  <text x="92" y="302" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="56" font-weight="700" fill="#21352D">しつこい？</text>
  <text x="92" y="384" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="34" font-weight="700" fill="#9A5B34">40代シングル父の</text>
  <text x="92" y="430" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="34" font-weight="700" fill="#9A5B34">体験ベースで整理</text>
  <rect x="755" y="128" width="320" height="360" rx="28" fill="#E8F0EA" stroke="#7DA08F" stroke-width="4"/>
  <rect x="802" y="176" width="226" height="42" rx="21" fill="#FFFDFC"/>
  <text x="915" y="204" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="700" fill="#2F5D50">相談前の不安</text>
  <text x="800" y="268" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#21352D">・売り込まれないか</text>
  <text x="800" y="314" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#21352D">・今の保障で足りるか</text>
  <text x="800" y="360" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#21352D">・教育費と両立できるか</text>
  <text x="800" y="430" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="700" fill="#9A5B34">1人で決め切れない人向け</text>
  <text x="92" y="532" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="600" fill="#6D6A63">保険料より前に、今の設計が合っているかを整理する記事</text>
</svg>
