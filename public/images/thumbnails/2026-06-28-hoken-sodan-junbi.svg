<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F6F1E8"/>
  <rect x="44" y="44" width="1112" height="542" rx="28" fill="#FFFDFC" stroke="#D9CBB8" stroke-width="4"/>
  <rect x="84" y="88" width="292" height="44" rx="22" fill="#2F5D50"/>
  <text x="230" y="117" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#FFFDFC">無料保険相談</text>
  <text x="92" y="206" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="54" font-weight="700" fill="#21352D">何を聞かれる？</text>
  <text x="92" y="282" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="54" font-weight="700" fill="#21352D">準備メモ</text>
  <text x="92" y="358" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="32" font-weight="700" fill="#9A5B34">シングル父が</text>
  <text x="92" y="402" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="32" font-weight="700" fill="#9A5B34">予約前に書いた3つ</text>
  <rect x="740" y="126" width="334" height="376" rx="28" fill="#E8F0EA" stroke="#7DA08F" stroke-width="4"/>
  <rect x="788" y="172" width="238" height="42" rx="21" fill="#FFFDFC"/>
  <text x="907" y="200" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="700" fill="#2F5D50">先にメモすること</text>
  <text x="784" y="270" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#21352D">・今の保険料</text>
  <text x="784" y="320" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#21352D">・不安なこと1つ</text>
  <text x="784" y="370" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="#21352D">・子どもの年齢</text>
  <text x="784" y="438" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="700" fill="#9A5B34">完璧な準備はいらない</text>
  <text x="92" y="530" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="600" fill="#6D6A63">申込前で止まりやすい人向けに、最初の相談で必要なことだけ整理した記事</text>
</svg>
