<svg viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif">

  <rect width="680" height="260" rx="12" fill="#FAFDF8"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#1F4D32">エネチェンジで電気代を調べる流れ</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="24" y="52" width="140" height="72" rx="8" fill="#EAF4ED" stroke="#7CB089" stroke-width="1.5"/>
  <text x="94" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1F4D32">① 郵便番号と</text>
  <text x="94" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#1F4D32">現在の契約を入力</text>
  <text x="94" y="118" text-anchor="middle" font-size="10" fill="#666">約2分</text>

  <text x="180" y="92" text-anchor="middle" font-size="20" fill="#7CB089">→</text>

  <!-- Step 2 -->
  <rect x="196" y="52" width="140" height="72" rx="8" fill="#EAF4ED" stroke="#7CB089" stroke-width="1.5"/>
  <text x="266" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1F4D32">② 切り替え候補</text>
  <text x="266" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#1F4D32">プランが表示</text>
  <text x="266" y="118" text-anchor="middle" font-size="10" fill="#666">年間差額の目安も</text>

  <text x="352" y="92" text-anchor="middle" font-size="20" fill="#7CB089">→</text>

  <!-- Step 3 -->
  <rect x="368" y="52" width="140" height="72" rx="8" fill="#EAF4ED" stroke="#7CB089" stroke-width="1.5"/>
  <text x="438" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1F4D32">③ 切り替えるか</text>
  <text x="438" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#1F4D32">判断するだけ</text>
  <text x="438" y="118" text-anchor="middle" font-size="10" fill="#666">変えなくてもOK</text>

  <!-- Result boxes -->
  <rect x="24" y="148" width="290" height="44" rx="8" fill="#FFF0F0" stroke="#E8AAAA" stroke-width="1"/>
  <text x="169" y="168" text-anchor="middle" font-size="12" fill="#C0392B" font-weight="700">候補なし・オール電化等</text>
  <text x="169" y="184" text-anchor="middle" font-size="11" fill="#888">→「今は変えなくていい」とわかった</text>

  <rect x="330" y="148" width="326" height="44" rx="8" fill="#EAF4ED" stroke="#7CB089" stroke-width="1"/>
  <text x="493" y="168" text-anchor="middle" font-size="12" fill="#1F4D32" font-weight="700">候補あり・差額プラスの場合</text>
  <text x="493" y="184" text-anchor="middle" font-size="11" fill="#444">→ 申し込みで毎月自動で安くなる</text>

  <!-- Note -->
  <text x="340" y="234" text-anchor="middle" font-size="11" fill="#999">無料・5分・郵便番号だけで確認できる</text>

</svg>
