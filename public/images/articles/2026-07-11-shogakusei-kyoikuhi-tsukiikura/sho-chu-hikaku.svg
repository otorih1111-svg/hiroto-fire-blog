<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif">
  <rect width="800" height="460" fill="#FFFFFF"/>
  <text x="400" y="46" text-anchor="middle" font-size="26" font-weight="bold" fill="#1F4D32">教育費は中学で「月1.5万円」増える（平均）</text>
  <text x="400" y="74" text-anchor="middle" font-size="14" fill="#5a7367">出典：文部科学省「令和5年度子供の学習費調査」（年額を12で割った月額換算）</text>

  <!-- 基準線 -->
  <line x1="90" y1="380" x2="710" y2="380" stroke="#CDE6D6" stroke-width="2"/>

  <!-- うち（小4）: 27,000 -->
  <rect x="120" y="218" width="130" height="162" rx="8" fill="#7CB089"/>
  <text x="185" y="200" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4D32">27,000円</text>
  <text x="185" y="408" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F4D32">うち（小4の実額）</text>

  <!-- 公立小平均: 31,000 -->
  <rect x="335" y="194" width="130" height="186" rx="8" fill="#2d7a4f"/>
  <text x="400" y="176" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F4D32">約31,000円</text>
  <text x="400" y="408" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F4D32">公立小の平均</text>
  <text x="400" y="428" text-anchor="middle" font-size="12" fill="#5a7367">年間 約36.7万円</text>

  <!-- 公立中平均: 45,000 -->
  <rect x="550" y="110" width="130" height="270" rx="8" fill="#ef7f1a"/>
  <text x="615" y="92" text-anchor="middle" font-size="22" font-weight="bold" fill="#b35c05">約45,000円</text>
  <text x="615" y="408" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F4D32">公立中の平均</text>
  <text x="615" y="428" text-anchor="middle" font-size="12" fill="#5a7367">年間 約54.2万円</text>

  <!-- 増加の矢印と注記 -->
  <path d="M 470 180 C 510 140, 530 130, 560 122" stroke="#b35c05" stroke-width="3" fill="none" stroke-dasharray="6 5"/>
  <path d="M 560 122 l -14 -2 m 14 2 l -8 12" stroke="#b35c05" stroke-width="3" fill="none" stroke-linecap="round"/>
  <rect x="430" y="228" width="190" height="54" rx="10" fill="#FFF6E8" stroke="#ef7f1a" stroke-width="1.5"/>
  <text x="525" y="251" text-anchor="middle" font-size="15" font-weight="bold" fill="#b35c05">中学に上がると</text>
  <text x="525" y="272" text-anchor="middle" font-size="16" font-weight="bold" fill="#b35c05">月 +1.4〜1.5万円</text>
</svg>
