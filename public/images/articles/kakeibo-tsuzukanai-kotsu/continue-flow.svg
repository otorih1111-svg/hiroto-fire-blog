<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 690" width="440" height="690" role="img" aria-label="家計簿が続かない流れと、続きやすい流れの違いを比べた図">
  <title>家計簿が続かない流れと、続きやすい流れの違い</title>

  <rect width="440" height="690" fill="#F7FBF8"/>

  <text x="220" y="36" text-anchor="middle" font-family="Hiragino Sans, sans-serif" font-size="19" font-weight="bold" fill="#1F4D32">続かない人が変えるべきポイント</text>
  <text x="220" y="60" text-anchor="middle" font-family="Hiragino Sans, sans-serif" font-size="13" fill="#5F6F65">気合いより、続く形に変える方が早い</text>

  <!-- 続かない流れ -->
  <rect x="20" y="80" width="400" height="218" rx="16" fill="#FFF7F2" stroke="#F2D9C8" stroke-width="2"/>
  <text x="42" y="112" font-family="Hiragino Sans, sans-serif" font-size="17" font-weight="bold" fill="#8A4D21">✗ 続かない流れ</text>

  <text x="42" y="146" font-family="Hiragino Sans, sans-serif" font-size="14.5" fill="#8A5A34">1. 手入力で始める</text>
  <text x="42" y="178" font-family="Hiragino Sans, sans-serif" font-size="14.5" fill="#8A5A34">2. 分類で止まる</text>
  <text x="42" y="210" font-family="Hiragino Sans, sans-serif" font-size="14.5" fill="#8A5A34">3. 1日抜けて嫌になる</text>
  <text x="42" y="242" font-family="Hiragino Sans, sans-serif" font-size="14.5" fill="#8A5A34">4. また明日で終わる</text>

  <text x="42" y="274" font-family="Hiragino Sans, sans-serif" font-size="12.5" font-weight="bold" fill="#8A5A34">気合い頼みだと、だいたい3日で止まる</text>

  <!-- 矢印 -->
  <path d="M220 312V344" stroke="#7CB089" stroke-width="10" stroke-linecap="round"/>
  <path d="M204 330L220 346L236 330" stroke="#7CB089" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 続きやすい流れ -->
  <rect x="20" y="366" width="400" height="218" rx="16" fill="#F3F8F4" stroke="#CFE2D4" stroke-width="2"/>
  <text x="42" y="398" font-family="Hiragino Sans, sans-serif" font-size="17" font-weight="bold" fill="#1F4D32">◎ 続きやすい流れ</text>

  <text x="42" y="432" font-family="Hiragino Sans, sans-serif" font-size="14.5" fill="#315C43">1. 口座とカードを連携する</text>
  <text x="42" y="464" font-family="Hiragino Sans, sans-serif" font-size="14.5" fill="#315C43">2. 支出をまとめて見る</text>
  <text x="42" y="496" font-family="Hiragino Sans, sans-serif" font-size="14.5" fill="#315C43">3. ざっくり把握する</text>
  <text x="42" y="528" font-family="Hiragino Sans, sans-serif" font-size="14.5" fill="#315C43">4. 必要な所だけ見直す</text>

  <text x="42" y="560" font-family="Hiragino Sans, sans-serif" font-size="12.5" font-weight="bold" fill="#315C43">完璧より見える化を優先すると、かなり続く</text>

  <!-- 結論 -->
  <rect x="20" y="608" width="400" height="62" rx="16" fill="#FFF9E8" stroke="#F0E2AE" stroke-width="2"/>
  <text x="220" y="636" text-anchor="middle" font-family="Hiragino Sans, sans-serif" font-size="14" font-weight="bold" fill="#6A5B1C">必要なのは気合いではなく</text>
  <text x="220" y="658" text-anchor="middle" font-family="Hiragino Sans, sans-serif" font-size="14" font-weight="bold" fill="#6A5B1C">「続く仕組み」に変えること</text>
</svg>
