<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" fill="#F7FBF8"/>

  <!-- タイトル -->
  <text x="600" y="50" font-size="28" font-weight="bold" text-anchor="middle"
    font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
    節約 → 投資 → 副業 ロードマップ
  </text>

  <!-- ===== STEP1：節約 ===== -->
  <rect x="100" y="90" width="1000" height="320" rx="14" fill="#fff" stroke="#1F4D32" stroke-width="2"/>
  <rect x="100" y="90" width="1000" height="60" rx="14" fill="#1F4D32"/>
  <rect x="100" y="130" width="1000" height="20" fill="#1F4D32"/>
  <circle cx="160" cy="120" r="28" fill="#fff"/>
  <text x="160" y="129" font-size="24" font-weight="bold" text-anchor="middle" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">1</text>
  <text x="210" y="130" font-size="24" font-weight="bold" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#fff">節約：固定費を見直す</text>

  <!-- 内訳3項目 -->
  <rect x="130" y="180" width="290" height="100" rx="10" fill="#E8F5E9" stroke="#1F4D32" stroke-width="1.5"/>
  <text x="275" y="210" font-size="16" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">スマホ・光回線</text>
  <text x="275" y="245" font-size="20" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">月8,300円減</text>

  <rect x="455" y="180" width="290" height="100" rx="10" fill="#E8F5E9" stroke="#1F4D32" stroke-width="1.5"/>
  <text x="600" y="210" font-size="16" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">保険の見直し</text>
  <text x="600" y="245" font-size="20" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">月6,400円減</text>

  <rect x="780" y="180" width="290" height="100" rx="10" fill="#E8F5E9" stroke="#1F4D32" stroke-width="1.5"/>
  <text x="925" y="210" font-size="16" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">サブスク・外食</text>
  <text x="925" y="245" font-size="20" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">月5,000円前後減</text>

  <!-- 合計 -->
  <rect x="300" y="310" width="600" height="70" rx="10" fill="#1F4D32"/>
  <text x="600" y="355" font-size="22" font-weight="bold" text-anchor="middle" fill="#fff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    合計：月19,700円の節約
  </text>

  <!-- 矢印1 -->
  <line x1="600" y1="410" x2="600" y2="450" stroke="#999" stroke-width="3"/>
  <polygon points="600,460 590,442 610,442" fill="#999"/>

  <!-- ===== STEP2：投資 ===== -->
  <rect x="100" y="470" width="1000" height="140" rx="14" fill="#fff" stroke="#A65DA6" stroke-width="2"/>
  <circle cx="170" cy="540" r="34" fill="#A65DA6"/>
  <text x="170" y="550" font-size="26" font-weight="bold" text-anchor="middle" fill="#fff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">2</text>
  <text x="225" y="515" font-size="22" font-weight="bold" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#6A3D6A">投資：浮いたお金を「先取り」でNISAに</text>
  <text x="225" y="555" font-size="16" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#555">19,700円の余白から5,000円を上乗せ</text>
  <text x="225" y="585" font-size="16" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#555">積立額：月3,000円 → 月8,000円（給料日翌日に先取り設定）</text>
  <rect x="850" y="495" width="190" height="80" rx="10" fill="#F3E5F5" stroke="#A65DA6" stroke-width="1.5"/>
  <text x="945" y="535" font-size="18" text-anchor="middle" font-weight="bold" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#6A3D6A">月8,000円</text>
  <text x="945" y="560" font-size="14" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#6A3D6A">積立中</text>

  <!-- 矢印2 -->
  <line x1="600" y1="610" x2="600" y2="650" stroke="#999" stroke-width="3"/>
  <polygon points="600,660 590,642 610,642" fill="#999"/>

  <!-- ===== STEP3：副業 ===== -->
  <rect x="100" y="670" width="1000" height="140" rx="14" fill="#fff" stroke="#E8A000" stroke-width="2"/>
  <circle cx="170" cy="740" r="34" fill="#E8A000"/>
  <text x="170" y="750" font-size="26" font-weight="bold" text-anchor="middle" fill="#fff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3</text>
  <text x="225" y="715" font-size="22" font-weight="bold" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#7B5800">副業：残った時間とお金でAI×発信に挑戦</text>
  <text x="225" y="755" font-size="16" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#555">Threads・XでAI副業を発信しながら</text>
  <text x="225" y="785" font-size="16" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#555">Claude Codeでブログ運営を仕組み化中</text>
  <rect x="850" y="695" width="190" height="80" rx="10" fill="#FFF8E1" stroke="#E8A000" stroke-width="1.5"/>
  <text x="945" y="735" font-size="18" text-anchor="middle" font-weight="bold" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#7B5800">収益0円</text>
  <text x="945" y="760" font-size="14" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#7B5800">挑戦中</text>

  <!-- フッター -->
  <text x="600" y="855" font-size="16" text-anchor="middle"
    font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#555">
    節約で土台を作り、投資で将来に回し、副業で次の一手を増やす
  </text>
</svg>
