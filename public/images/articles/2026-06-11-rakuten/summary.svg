<svg width="1200" height="460" viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="460" fill="#F7FBF8"/>
  
  <!-- タイトル -->
  <text x="600" y="35" font-size="28" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
    楽天経済圏：ポイント獲得 vs 隠れた固定費
  </text>
  
  <!-- 左側：期待値 -->
  <g>
    <!-- 背景ボックス -->
    <rect x="30" y="70" width="320" height="360" fill="white" stroke="#7CB089" stroke-width="2" rx="8"/>
    
    <!-- タイトル -->
    <text x="190" y="105" font-size="18" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      期待：お得なはず
    </text>
    
    <!-- ポイント獲得 -->
    <circle cx="190" cy="165" r="35" fill="#7CB089"/>
    <text x="190" y="170" font-size="14" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">
      ポイント
    </text>
    
    <text x="190" y="210" font-size="16" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      月2,000～3,000pt
    </text>
    
    <!-- 節約内容 -->
    <text x="50" y="265" font-size="13" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      ✓ 通信費 7,000円→1,078円
    </text>
    <text x="50" y="290" font-size="13" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      ✓ SPU倍率アップ
    </text>
    <text x="50" y="315" font-size="13" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      ✓ 各種サービス統一
    </text>
    
    <!-- 結論 -->
    <rect x="50" y="335" width="260" height="80" fill="#E8F5E9" stroke="#7CB089" stroke-width="1" rx="4"/>
    <text x="180" y="360" font-size="12" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      「これは正解だった」
    </text>
    <text x="180" y="385" font-size="11" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      実感：1年目は順調
    </text>
  </g>
  
  <!-- 矢印 -->
  <g>
    <line x1="370" y1="250" x2="430" y2="250" stroke="#1F4D32" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="400" y="235" font-size="12" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32" font-weight="bold">
      1年経過
    </text>
  </g>
  
  <!-- 矢印定義 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1F4D32"/>
    </marker>
  </defs>
  
  <!-- 右側：現実 -->
  <g>
    <!-- 背景ボックス -->
    <rect x="850" y="70" width="320" height="360" fill="white" stroke="#1F4D32" stroke-width="2" rx="8"/>
    
    <!-- タイトル -->
    <text x="1010" y="105" font-size="18" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      現実：お金が残らない
    </text>
    
    <!-- 隠れた固定費 -->
    <circle cx="1010" cy="165" r="35" fill="#E57373"/>
    <text x="1010" y="170" font-size="14" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">
      隠れた費用
    </text>
    
    <text x="1010" y="210" font-size="16" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      月5,000～7,000円
    </text>
    
    <!-- 隠れた支出内容 -->
    <text x="870" y="265" font-size="12" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      ✗ 楽天マガジン 380円（未使用）
    </text>
    <text x="870" y="290" font-size="12" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      ✗ 楽天ミュージック 980円（重複）
    </text>
    <text x="870" y="315" font-size="12" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      ✗ 楽天ひかり 4,180円（割引終了）
    </text>
    <text x="870" y="340" font-size="12" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      ✗ データ追加購入 500円×複数回
    </text>
    
    <!-- 結論 -->
    <rect x="870" y="355" width="260" height="60" fill="#FFEBEE" stroke="#E57373" stroke-width="1" rx="4"/>
    <text x="1000" y="375" font-size="12" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      ポイント獲得＜実質支出
    </text>
    <text x="1000" y="400" font-size="11" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      「確認しない」が固定費を育てた
    </text>
  </g>
  
  <!-- 中央：対比 -->
  <g>
    <text x="600" y="450" font-size="12" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32" font-weight="bold">
      対策：4つのステップで明細を確認し、無駄な固定費を削減することが重要
    </text>
  </g>
</svg>