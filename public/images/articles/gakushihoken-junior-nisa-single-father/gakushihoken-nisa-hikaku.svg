<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 528" width="440" height="528" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect width="440" height="528" fill="#f8f9fa" rx="12"/>

  <text x="220" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1F4D32">子どもの教育費で使える3つの箱</text>

  <!-- 学資保険 -->
  <rect x="16" y="46" width="408" height="126" fill="#FFF6E5" rx="10" stroke="#E0A030" stroke-width="2"/>
  <text x="34" y="76" font-size="20" font-weight="bold" fill="#A96A00">学資保険</text>
  <rect x="300" y="58" width="108" height="26" rx="13" fill="#A96A00"/>
  <text x="354" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">今も入れる</text>
  <text x="34" y="107" font-size="17" font-weight="bold" fill="#333">返戻率 100〜105%程度</text>
  <text x="34" y="132" font-size="14.5" fill="#666">20年預けても、ほぼ増えない</text>
  <text x="34" y="156" font-size="14.5" fill="#C0392B">途中解約すると元本割れすることも</text>

  <!-- ジュニアNISA -->
  <rect x="16" y="182" width="408" height="126" fill="#F1F3F2" rx="10" stroke="#9AA5A0" stroke-width="2"/>
  <text x="34" y="212" font-size="20" font-weight="bold" fill="#5C6763">ジュニアNISA</text>
  <rect x="286" y="194" width="122" height="26" rx="13" fill="#5C6763"/>
  <text x="347" y="212" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">2023年末で終了</text>
  <text x="34" y="243" font-size="17" font-weight="bold" fill="#333">ぼくが使ったのはこの箱</text>
  <text x="34" y="268" font-size="14.5" fill="#666">年80万円まで・運用しだいで非課税</text>
  <text x="34" y="292" font-size="14.5" fill="#2e7d32">終了後は引き出しが自由になった</text>

  <!-- こどもNISA -->
  <rect x="16" y="318" width="408" height="126" fill="#EAF4ED" rx="10" stroke="#7CB089" stroke-width="2"/>
  <text x="34" y="348" font-size="20" font-weight="bold" fill="#1F4D32">こどもNISA</text>
  <rect x="264" y="330" width="144" height="26" rx="13" fill="#1F4D32"/>
  <text x="336" y="348" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">2027年1月開始予定</text>
  <text x="34" y="379" font-size="17" font-weight="bold" fill="#333">年60万円・生涯600万円まで</text>
  <text x="34" y="404" font-size="14.5" fill="#666">非課税で持てる期間は無期限</text>
  <text x="34" y="428" font-size="14.5" fill="#2e7d32">12歳以降は条件つきで引き出せる</text>

  <!-- 結論帯 -->
  <rect x="16" y="456" width="408" height="42" fill="#1F4D32" rx="8"/>
  <text x="220" y="473" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#fff">ぼくが選んだのは真ん中の箱。</text>
  <text x="220" y="490" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#A8D8B9">でも今から同じことをするなら、選択肢は一番下になる</text>

  <text x="220" y="516" text-anchor="middle" font-size="11" fill="#888">※こどもNISAは2027年1月開始予定。詳細は2026年中に公表予定です。</text>
</svg>
