<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect width="800" height="160" fill="#f0f7f0" rx="12"/>
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">新NISAを続けるための順番</text>

  <rect x="20" y="40" width="170" height="100" fill="#fff" rx="10" stroke="#e57373" stroke-width="2"/>
  <text x="105" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">STEP 1</text>
  <text x="105" y="88" text-anchor="middle" font-size="11" fill="#333">家計の見える化</text>
  <text x="105" y="106" text-anchor="middle" font-size="11" fill="#555">収入・固定費・</text>
  <text x="105" y="122" text-anchor="middle" font-size="11" fill="#555">支出を書き出す</text>

  <text x="198" y="95" text-anchor="middle" font-size="20" fill="#aaa">▶</text>

  <rect x="210" y="40" width="170" height="100" fill="#fff" rx="10" stroke="#ff9800" stroke-width="2"/>
  <text x="295" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">STEP 2</text>
  <text x="295" y="88" text-anchor="middle" font-size="11" fill="#333">固定費の整理</text>
  <text x="295" y="106" text-anchor="middle" font-size="11" fill="#555">使っていないもの</text>
  <text x="295" y="122" text-anchor="middle" font-size="11" fill="#555">を1つ解約する</text>

  <text x="388" y="95" text-anchor="middle" font-size="20" fill="#aaa">▶</text>

  <rect x="400" y="40" width="170" height="100" fill="#fff" rx="10" stroke="#4caf50" stroke-width="2"/>
  <text x="485" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">STEP 3</text>
  <text x="485" y="88" text-anchor="middle" font-size="11" fill="#333">積立額を決める</text>
  <text x="485" y="106" text-anchor="middle" font-size="11" fill="#555">無理なく続けられる</text>
  <text x="485" y="122" text-anchor="middle" font-size="11" fill="#555">最低ラインから</text>

  <text x="578" y="95" text-anchor="middle" font-size="20" fill="#aaa">▶</text>

  <rect x="590" y="40" width="190" height="100" fill="#e8f5e9" rx="10" stroke="#2e7d32" stroke-width="2"/>
  <text x="685" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">STEP 4</text>
  <text x="685" y="88" text-anchor="middle" font-size="11" fill="#333">先取りで積立開始</text>
  <text x="685" y="106" text-anchor="middle" font-size="11" fill="#555">給料日に自動で引く</text>
  <text x="685" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">あとはほったらかし</text>
</svg>
