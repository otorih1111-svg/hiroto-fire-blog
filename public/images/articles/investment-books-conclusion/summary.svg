  </text>

  <rect x="110" y="384" width="290" height="228" rx="24" fill="#FFFFFF" stroke="#7BA889" stroke-width="3"/>
  <circle cx="255" cy="446" r="44" fill="#E7F4EA"/>
  <path d="M233 446H277" stroke="#2F6B47" stroke-width="10" stroke-linecap="round"/>
  <text x="255" y="538" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="34" font-weight="700" fill="#1F5133">
