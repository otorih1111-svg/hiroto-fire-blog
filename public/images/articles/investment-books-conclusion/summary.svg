<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="32" fill="#F6FAF7"/>
  <rect x="36" y="36" width="1128" height="688" rx="28" fill="#FCFFFD" stroke="#D7E8DB" stroke-width="2"/>

  <text x="600" y="112" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="48" font-weight="700" fill="#1F5133">
