  <path d="M600 420V446L618 464" stroke="#2F6B47" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="600" cy="446" r="30" stroke="#2F6B47" stroke-width="8"/>
  <text x="600" y="538" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="34" font-weight="700" fill="#1F5133">
