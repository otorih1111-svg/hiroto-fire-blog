<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect width="800" height="160" fill="#f0f7f0" rx="12"/>

  <!-- Step 1 -->
  <rect x="20" y="25" width="220" height="110" fill="#fff" rx="10" stroke="#4caf50" stroke-width="2"/>
  <text x="130" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">STEP 1</text>
  <text x="130" y="78" text-anchor="middle" font-size="12" fill="#333">固定費・通信費を見直す</text>
  <text x="130" y="98" text-anchor="middle" font-size="11" fill="#555">月3,000〜10,000円を</text>
  <text x="130" y="116" text-anchor="middle" font-size="11" fill="#555">投資資金に回す</text>

  <!-- Arrow -->
  <text x="255" y="90" text-anchor="middle" font-size="22" fill="#aaa">▶</text>

  <!-- Step 2 -->
  <rect x="280" y="25" width="220" height="110" fill="#fff" rx="10" stroke="#4caf50" stroke-width="2"/>
  <text x="390" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">STEP 2</text>
  <text x="390" y="78" text-anchor="middle" font-size="12" fill="#333">新NISAで積立を設定</text>
  <text x="390" y="98" text-anchor="middle" font-size="11" fill="#555">月5,000円〜でOK</text>
  <text x="390" y="116" text-anchor="middle" font-size="11" fill="#555">全世界株インデックスで放置</text>

  <!-- Arrow -->
  <text x="515" y="90" text-anchor="middle" font-size="22" fill="#aaa">▶</text>

  <!-- Step 3 -->
  <rect x="540" y="25" width="240" height="110" fill="#fff9c4" rx="10" stroke="#f9a825" stroke-width="2"/>
  <text x="660" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">STEP 3</text>
  <text x="660" y="78" text-anchor="middle" font-size="12" fill="#333">あとはほったらかし</text>
  <text x="660" y="98" text-anchor="middle" font-size="11" fill="#555">年1回リバランスするだけ</text>
  <text x="660" y="116" text-anchor="middle" font-size="11" fill="#555">20〜30年複利で育てる</text>
</svg>
