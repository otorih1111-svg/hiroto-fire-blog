<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="675" fill="#F7FBF8"/>

  <!-- タイトル -->
  <text x="600" y="50" font-size="26" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
    新NISA と iDeCo の違い（2026年6月時点）
  </text>

  <g font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    <!-- ヘッダー行 -->
    <rect x="60" y="90" width="260" height="64" fill="#EAF4ED" stroke="#1F4D32" stroke-width="2"/>
    <rect x="320" y="90" width="410" height="64" fill="#7CB089"/>
    <rect x="730" y="90" width="410" height="64" fill="#1F4D32"/>

    <text x="190" y="130" font-size="17" font-weight="bold" text-anchor="middle" fill="#1F4D32">項目</text>
    <text x="525" y="130" font-size="19" font-weight="bold" text-anchor="middle" fill="#fff">新NISA</text>
    <text x="935" y="130" font-size="19" font-weight="bold" text-anchor="middle" fill="#fff">iDeCo</text>

    <!-- 行1：いつ使えるか（強調） -->
    <rect x="60" y="154" width="260" height="92" fill="#FFF7E8" stroke="#E8924A" stroke-width="2.5"/>
    <rect x="320" y="154" width="410" height="92" fill="#FFF7E8" stroke="#E8924A" stroke-width="2.5"/>
    <rect x="730" y="154" width="410" height="92" fill="#FFF7E8" stroke="#E8924A" stroke-width="2.5"/>
    <text x="190" y="206" font-size="17" font-weight="bold" text-anchor="middle" fill="#1F4D32">いつ使えるか</text>
    <text x="525" y="200" font-size="20" font-weight="bold" text-anchor="middle" fill="#E8924A">いつでも</text>
    <text x="525" y="228" font-size="14" text-anchor="middle" fill="#666">売却すれば自由に使える</text>
    <text x="935" y="200" font-size="20" font-weight="bold" text-anchor="middle" fill="#E8924A">原則60歳まで不可</text>
    <text x="935" y="228" font-size="14" text-anchor="middle" fill="#666">途中で取り出せない</text>

    <!-- 行2：手数料 -->
    <rect x="60" y="246" width="260" height="84" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <rect x="320" y="246" width="410" height="84" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <rect x="730" y="246" width="410" height="84" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <text x="190" y="296" font-size="17" font-weight="bold" text-anchor="middle" fill="#1F4D32">手数料</text>
    <text x="525" y="290" font-size="18" text-anchor="middle" fill="#333">基本無料</text>
    <text x="525" y="314" font-size="14" text-anchor="middle" fill="#666">（金融機関による）</text>
    <text x="935" y="290" font-size="18" text-anchor="middle" fill="#333">最低 月171円</text>
    <text x="935" y="314" font-size="14" text-anchor="middle" fill="#666">＋加入時2,829円</text>

    <!-- 行3：税制優遇 -->
    <rect x="60" y="330" width="260" height="84" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <rect x="320" y="330" width="410" height="84" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <rect x="730" y="330" width="410" height="84" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <text x="190" y="380" font-size="17" font-weight="bold" text-anchor="middle" fill="#1F4D32">税制優遇</text>
    <text x="525" y="374" font-size="18" text-anchor="middle" fill="#333">運用益が非課税</text>
    <text x="935" y="368" font-size="18" text-anchor="middle" fill="#333">運用益非課税</text>
    <text x="935" y="394" font-size="14" text-anchor="middle" fill="#666">＋積立額が所得控除</text>

    <!-- 行4：2026年12月改正（加入年齢） -->
    <rect x="60" y="414" width="260" height="92" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <rect x="320" y="414" width="410" height="92" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <rect x="730" y="414" width="410" height="92" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <text x="190" y="466" font-size="17" font-weight="bold" text-anchor="middle" fill="#1F4D32">加入年齢</text>
    <text x="525" y="466" font-size="18" text-anchor="middle" fill="#333">年齢の上限なし</text>
    <text x="935" y="453" font-size="18" text-anchor="middle" fill="#333">70歳未満まで拡大</text>
    <text x="935" y="479" font-size="14" text-anchor="middle" fill="#666">（2026年12月改正・現行65歳未満）</text>

    <!-- 行5：受け取り時の注意 -->
    <rect x="60" y="506" width="260" height="92" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <rect x="320" y="506" width="410" height="92" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <rect x="730" y="506" width="410" height="92" fill="#fff" stroke="#1F4D32" stroke-width="1.5"/>
    <text x="190" y="558" font-size="17" font-weight="bold" text-anchor="middle" fill="#1F4D32">受け取り時</text>
    <text x="525" y="558" font-size="18" text-anchor="middle" fill="#333">課税なし</text>
    <text x="935" y="545" font-size="18" text-anchor="middle" fill="#333">退職金との順番に注意</text>
    <text x="935" y="571" font-size="14" text-anchor="middle" fill="#666">（2026年1月〜10年ルール）</text>
  </g>

  <!-- フッター注記 -->
  <rect x="60" y="616" width="1080" height="42" rx="10" fill="#EAF4ED" stroke="#1F4D32" stroke-width="2"/>
  <text x="600" y="643" font-size="16" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
    「自由に使えるお金」か「老後専用のお金」か。ここが一番の分かれ道。
  </text>
</svg>
