<svg width="1200" height="460" viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&amp;display=swap');
      text { font-family: 'Noto Sans JP', sans-serif; }
      .title { font-size: 28px; font-weight: 700; fill: #1F4D32; }
      .subtitle { font-size: 14px; font-weight: 600; fill: #1F4D32; }
      .label { font-size: 13px; font-weight: 600; fill: #1F4D32; }
      .text { font-size: 12px; fill: #333; }
      .arrow { stroke: #7CB089; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7CB089"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="460" fill="#F7FBF8"/>

  <!-- タイトル -->
  <text x="600" y="35" text-anchor="middle" class="title">投資を続ける前に整えた3つのこと</text>

  <!-- Before状態（左側） -->
  <g>
    <!-- ボックス -->
    <rect x="30" y="70" width="320" height="360" fill="#fff" stroke="#C5D5C0" stroke-width="2" rx="8"/>
    
    <!-- タイトル -->
    <text x="190" y="100" text-anchor="middle" class="subtitle">Before</text>
    <text x="190" y="120" text-anchor="middle" font-size="11" fill="#E74C3C">投資がストレス</text>
    
    <!-- 内容 -->
    <rect x="50" y="140" width="280" height="280" fill="#FEF5F5" rx="4"/>
    
    <text x="60" y="165" class="label">❌ 毎月1日のドキドキ</text>
    <text x="70" y="185" class="text">引き落とし日が近づくと</text>
    <text x="70" y="200" class="text">「今月大丈夫？」と確認</text>
    
    <line x1="60" y1="215" x2="310" y2="215" stroke="#E0E0E0" stroke-width="1"/>
    
    <text x="60" y="240" class="label">❌ 特別支出の盲点</text>
    <text x="70" y="260" class="text">車検、学校費用が</text>
    <text x="70" y="275" class="text">突然の大きな出費に見える</text>
    
    <line x1="60" y1="290" x2="310" y2="290" stroke="#E0E0E0" stroke-width="1"/>
    
    <text x="60" y="315" class="label">❌ 緊急資金がない</text>
    <text x="70" y="335" class="text">万が一の時は</text>
    <text x="70" y="350" class="text">NISAを崩すしかない</text>
    
    <text x="190" y="385" text-anchor="middle" font-size="11" fill="#666">「乗り遅れたくない」で</text>
    <text x="190" y="400" text-anchor="middle" font-size="11" fill="#666">とりあえず始めた結果...</text>
  </g>

  <!-- 矢印 -->
  <path d="M 360 250 L 420 250" class="arrow"/>

  <!-- 真ん中：3つのステップ -->
  <g>
    <text x="500" y="95" text-anchor="middle" class="subtitle">解決のステップ</text>
    
    <!-- ステップ1 -->
    <circle cx="500" cy="155" r="22" fill="#1F4D32" stroke="#7CB089" stroke-width="2"/>
    <text x="500" y="162" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">①</text>
    
    <text x="500" y="190" text-anchor="middle" class="label">支出を3分類</text>
    <text x="500" y="207" text-anchor="middle" font-size="11" fill="#666">固定費・変動費・特別支出</text>
    <text x="500" y="222" text-anchor="middle" font-size="11" fill="#666">→ 特別支出を年間合計して</text>
    <text x="500" y="237" text-anchor="middle" font-size="11" fill="#666">月割りで積立</text>
    
    <!-- ステップ2 -->
    <circle cx="500" cy="305" r="22" fill="#7CB089" stroke="#1F4D32" stroke-width="2"/>
    <text x="500" y="312" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">②</text>
    
    <text x="500" y="340" text-anchor="middle" class="label">生活防衛費を設定</text>
    <text x="500" y="357" text-anchor="middle" font-size="11" fill="#666">生活費6ヶ月分（138万円）</text>
    <text x="500" y="372" text-anchor="middle" font-size="11" fill="#666">→ 貯まるまでNISA額を抑制</text>
    <text x="500" y="387" text-anchor="middle" font-size="11" fill="#666">投資に安心感が生まれる</text>
    
    <!-- 矢印（ステップ間） -->
    <path d="M 500 177 L 500 283" class="arrow"/>
    
    <!-- ステップ3 -->
    <circle cx="500" cy="435" r="18" fill="#1F4D32" stroke="#7CB089" stroke-width="2"/>
    <text x="500" y="440" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">③</text>
  </g>

  <!-- After状態（右側） -->
  <g>
    <!-- ボックス -->
    <rect x="850" y="70" width="320" height="360" fill="#fff" stroke="#1F4D32" stroke-width="2" rx="8"/>
    
    <!-- タイトル -->
    <text x="1010" y="100" text-anchor="middle" class="subtitle">After</text>
    <text x="1010" y="120" text-anchor="middle" font-size="11" fill="#27AE60">安心して投資継続</text>
    
    <!-- 内容 -->
    <rect x="870" y="140" width="280" height="280" fill="#F0F7F2" rx="4"/>
    
    <text x="880" y="165" class="label">✓ 毎月ストレスフリー</text>
    <text x="890" y="185" class="text">緊急資金が充実</text>
    <text x="890" y="200" class="text">NISAを崩す心配なし</text>
    
    <line x1="880" y1="215" x2="1130" y2="215" stroke="#E0E0E0" stroke-width="1"/>
    
    <text x="880" y="240" class="label">✓ 支出が予測可能</text>
    <text x="890" y="260" class="text">特別支出を毎月積立</text>
    <text x="890" y="275" class="text">急な出費で焦らない</text>
    
    <line x1="880" y1="290" x2="1130" y2="290" stroke="#E0E0E0" stroke-width="1"/>
    
    <text x="880" y="315" class="label">✓ 投資額が確定</text>
    <text x="890" y="335" class="text">手取り-全支出</text>
    <text x="890" y="350" class="text">=投資可能額（逆算）</text>
    
    <text x="1010" y="385" text-anchor="middle" font-size="11" fill="#27AE60" font-weight="600">土台が整った状態で</text>
    <text x="1010" y="400" text-anchor="middle" font-size="11" fill="#27AE60" font-weight="600">継続できる投資へ</text>
  </g>

  <!-- 矢印（After方向） -->
  <path d="M 770 250 L 830 250" class="arrow"/>

  <!-- 下部：重要なポイント -->
  <rect x="30" y="445" width="1140" height="1" fill="#C5D5C0"/>
</svg>