<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
  <!-- 背景 -->
  <rect width="800" height="360" fill="#f8f9fa" rx="12"/>
  <!-- タイトル -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">楽天経済圏の連携図（ぼくの場合）</text>

  <!-- 楽天銀行（中央） -->
  <rect x="300" y="130" width="200" height="90" fill="#bf0000" rx="10"/>
  <text x="400" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">楽天銀行</text>
  <text x="400" y="190" text-anchor="middle" font-size="11" fill="#ffcccc">給与受取・副業出入金</text>
  <text x="400" y="208" text-anchor="middle" font-size="11" fill="#ffcccc">マネーブリッジ設定済み</text>

  <!-- 楽天カード（左） -->
  <rect x="60" y="60" width="180" height="80" fill="#fff" rx="10" stroke="#bf0000" stroke-width="2"/>
  <text x="150" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#bf0000">楽天カード</text>
  <text x="150" y="114" text-anchor="middle" font-size="11" fill="#555">無印・プレミアム</text>
  <text x="150" y="130" text-anchor="middle" font-size="11" fill="#555">ビジネス　3枚</text>

  <!-- 楽天証券（右） -->
  <rect x="560" y="60" width="180" height="80" fill="#fff" rx="10" stroke="#bf0000" stroke-width="2"/>
  <text x="650" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#bf0000">楽天証券</text>
  <text x="650" y="114" text-anchor="middle" font-size="11" fill="#555">NISA積立</text>
  <text x="650" y="130" text-anchor="middle" font-size="11" fill="#555">クレカ積立</text>

  <!-- 給与（上） -->
  <rect x="300" y="30" width="200" height="50" fill="#fff" rx="10" stroke="#888" stroke-width="1.5"/>
  <text x="400" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">本業の給与</text>

  <!-- 矢印：給与→銀行 -->
  <line x1="400" y1="80" x2="400" y2="128" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 矢印：カード→銀行（引き落とし） -->
  <line x1="240" y1="100" x2="300" y2="155" stroke="#bf0000" stroke-width="2"/>
  <polygon points="300,155 288,148 294,138" fill="#bf0000"/>
  <text x="245" y="145" text-anchor="middle" font-size="10" fill="#bf0000">引き落とし</text>
  <text x="245" y="158" text-anchor="middle" font-size="10" fill="#bf0000">SPU+1倍</text>

  <!-- 矢印：銀行→証券（マネーブリッジ） -->
  <line x1="500" y1="155" x2="560" y2="100" stroke="#bf0000" stroke-width="2"/>
  <polygon points="560,100 556,112 545,108" fill="#bf0000"/>
  <text x="558" y="145" text-anchor="middle" font-size="10" fill="#bf0000">即時移動</text>
  <text x="558" y="158" text-anchor="middle" font-size="10" fill="#bf0000">金利0.10%</text>

  <!-- ASP（左下） -->
  <rect x="60" y="260" width="180" height="60" fill="#fff" rx="10" stroke="#888" stroke-width="1.5"/>
  <text x="150" y="286" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">ASP報酬</text>
  <text x="150" y="306" text-anchor="middle" font-size="11" fill="#888">A8.net・afb等</text>

  <!-- 矢印：ASP→銀行 -->
  <line x1="240" y1="285" x2="300" y2="220" stroke="#888" stroke-width="1.5"/>
  <polygon points="300,220 290,228 283,218" fill="#888"/>

  <!-- 経費（右下） -->
  <rect x="560" y="260" width="180" height="60" fill="#fff" rx="10" stroke="#888" stroke-width="1.5"/>
  <text x="650" y="286" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">副業経費</text>
  <text x="650" y="306" text-anchor="middle" font-size="11" fill="#888">サーバー・ツール等</text>

  <!-- 矢印：銀行→経費 -->
  <line x1="500" y1="220" x2="560" y2="265" stroke="#888" stroke-width="1.5"/>
  <polygon points="560,265 549,260 554,249" fill="#888"/>

  <!-- 凡例 -->
  <line x1="60" y1="340" x2="90" y2="340" stroke="#bf0000" stroke-width="2"/>
  <text x="100" y="345" font-size="11" fill="#555">楽天グループ間の連携</text>
  <line x1="260" y1="340" x2="290" y2="340" stroke="#888" stroke-width="1.5"/>
  <text x="300" y="345" font-size="11" fill="#555">お金の流れ</text>

  <!-- arrowhead定義 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
</svg>
