<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="520" fill="#F7FBF8"/>

  <text x="600" y="52" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="700" fill="#1F4D32">
    楽天モバイルでメールアドレスはどうする？
  </text>
  <text x="600" y="88" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18" font-weight="500" fill="#4E6B57">
    迷ったら「何を優先するか」で3択に分ける
  </text>

  <rect x="70" y="130" width="300" height="250" rx="22" fill="#FFFFFF" stroke="#1F4D32" stroke-width="2"/>
  <rect x="95" y="156" width="108" height="34" rx="17" fill="#1F4D32"/>
  <text x="149" y="178" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">
    選択肢1
  </text>
  <text x="220" y="226" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="700" fill="#1F4D32">
    楽メール
  </text>
  <text x="220" y="258" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#4E6B57">
    @rakumail.jp を使う
  </text>
  <text x="110" y="305" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#1F4D32">
    ・楽天モバイルでまとめたい
  </text>
  <text x="110" y="335" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#1F4D32">
    ・新しいアドレスでも困らない
  </text>
  <text x="110" y="365" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#1F4D32">
    ・しばらく楽天を使う前提
  </text>

  <rect x="450" y="130" width="300" height="250" rx="22" fill="#FFF9F1" stroke="#F08A24" stroke-width="2"/>
  <rect x="475" y="156" width="108" height="34" rx="17" fill="#F08A24"/>
  <text x="529" y="178" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">
    選択肢2
  </text>
  <text x="600" y="226" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="700" fill="#A85A12">
    持ち運び
  </text>
  <text x="600" y="258" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#A85A12">
    今のキャリアメールを残す
  </text>
  <text x="490" y="305" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#7A4A1E">
    ・今のアドレスを変えたくない
  </text>
  <text x="490" y="335" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#7A4A1E">
    ・登録先変更を今すぐ減らしたい
  </text>
  <text x="490" y="365" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#7A4A1E">
    ・まずは通信費だけ下げたい
  </text>

  <rect x="830" y="130" width="300" height="250" rx="22" fill="#F4F8FF" stroke="#4B74C9" stroke-width="2"/>
  <rect x="855" y="156" width="108" height="34" rx="17" fill="#4B74C9"/>
  <text x="909" y="178" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">
    選択肢3
  </text>
  <text x="980" y="226" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="700" fill="#244A9C">
    Gmail
  </text>
  <text x="980" y="258" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#244A9C">
    回線と分けて管理する
  </text>
  <text x="870" y="305" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#244A9C">
    ・今後また乗り換えるかも
  </text>
  <text x="870" y="335" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#244A9C">
    ・副業や学校連絡も整理したい
  </text>
  <text x="870" y="365" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="600" fill="#244A9C">
    ・キャリア依存を減らしたい
  </text>

  <rect x="140" y="420" width="920" height="58" rx="16" fill="#EAF4ED" stroke="#1F4D32" stroke-width="2"/>
  <text x="600" y="456" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="19" font-weight="700" fill="#1F4D32">
    先に「何を優先するか」を決めると、メール整理で止まりにくい
  </text>
</svg>
