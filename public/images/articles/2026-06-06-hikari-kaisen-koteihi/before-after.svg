<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
  <!-- 背景 -->
  <rect width="800" height="300" fill="#f8f9fa" rx="12"/>

  <!-- タイトル -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">光回線の見直し　Before / After</text>

  <!-- Before ボックス -->
  <rect x="40" y="60" width="320" height="200" fill="#fff0f0" rx="10" stroke="#e57373" stroke-width="2"/>
  <text x="200" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#e53935">見直し前</text>
  <line x1="60" y1="102" x2="340" y2="102" stroke="#e57373" stroke-width="1"/>
  <text x="200" y="138" text-anchor="middle" font-size="36" font-weight="bold" fill="#e53935">5,500円</text>
  <text x="200" y="162" text-anchor="middle" font-size="12" fill="#888">/月</text>
  <text x="200" y="195" text-anchor="middle" font-size="13" fill="#555">セット割なし</text>
  <text x="200" y="218" text-anchor="middle" font-size="13" fill="#555">年間 66,000円</text>
  <text x="200" y="241" text-anchor="middle" font-size="12" fill="#888">「まあ仕方ない」で放置</text>

  <!-- 矢印 -->
  <text x="400" y="175" text-anchor="middle" font-size="28" fill="#666">→</text>

  <!-- After ボックス -->
  <rect x="440" y="60" width="320" height="200" fill="#f0f7f0" rx="10" stroke="#66bb6a" stroke-width="2"/>
  <text x="600" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">見直し後</text>
  <line x1="460" y1="102" x2="740" y2="102" stroke="#66bb6a" stroke-width="1"/>
  <text x="600" y="138" text-anchor="middle" font-size="36" font-weight="bold" fill="#2e7d32">〜3,000円台</text>
  <text x="600" y="162" text-anchor="middle" font-size="12" fill="#888">/月（楽天モバイルとセット）</text>
  <text x="600" y="195" text-anchor="middle" font-size="13" fill="#555">セット割 毎月1,000pt還元</text>
  <text x="600" y="218" text-anchor="middle" font-size="13" fill="#555">年間 36,000〜42,000円</text>
  <text x="600" y="241" text-anchor="middle" font-size="12" fill="#2e7d32">月2,000〜3,000円の削減</text>
</svg>
