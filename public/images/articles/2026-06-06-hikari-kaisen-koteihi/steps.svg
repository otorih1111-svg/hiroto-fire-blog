<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect width="800" height="160" fill="#f8fdf8" rx="12"/>

  <!-- Step 1 -->
  <rect x="20" y="30" width="160" height="100" fill="#e8f5e9" rx="10" stroke="#66bb6a" stroke-width="2"/>
  <text x="100" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">STEP 1</text>
  <text x="100" y="82" text-anchor="middle" font-size="12" fill="#333">今の契約を確認</text>
  <text x="100" y="100" text-anchor="middle" font-size="11" fill="#555">月額・縛り残り・</text>
  <text x="100" y="116" text-anchor="middle" font-size="11" fill="#555">違約金を調べる</text>

  <!-- Arrow -->
  <text x="198" y="88" text-anchor="middle" font-size="22" fill="#aaa">▶</text>

  <!-- Step 2 -->
  <rect x="210" y="30" width="160" height="100" fill="#e8f5e9" rx="10" stroke="#66bb6a" stroke-width="2"/>
  <text x="290" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">STEP 2</text>
  <text x="290" y="82" text-anchor="middle" font-size="12" fill="#333">乗り換え先を選ぶ</text>
  <text x="290" y="100" text-anchor="middle" font-size="11" fill="#555">スマホキャリアに</text>
  <text x="290" y="116" text-anchor="middle" font-size="11" fill="#555">合わせて探す</text>

  <!-- Arrow -->
  <text x="388" y="88" text-anchor="middle" font-size="22" fill="#aaa">▶</text>

  <!-- Step 3 -->
  <rect x="400" y="30" width="160" height="100" fill="#e8f5e9" rx="10" stroke="#66bb6a" stroke-width="2"/>
  <text x="480" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">STEP 3</text>
  <text x="480" y="82" text-anchor="middle" font-size="12" fill="#333">申し込み・工事</text>
  <text x="480" y="100" text-anchor="middle" font-size="11" fill="#555">オンライン申込み→</text>
  <text x="480" y="116" text-anchor="middle" font-size="11" fill="#555">工事（数時間）</text>

  <!-- Arrow -->
  <text x="578" y="88" text-anchor="middle" font-size="22" fill="#aaa">▶</text>

  <!-- Step 4 -->
  <rect x="590" y="30" width="190" height="100" fill="#fff9c4" rx="10" stroke="#f9a825" stroke-width="2"/>
  <text x="685" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">STEP 4</text>
  <text x="685" y="82" text-anchor="middle" font-size="12" fill="#333">旧回線を解約</text>
  <text x="685" y="100" text-anchor="middle" font-size="11" fill="#555">開通後に連絡→</text>
  <text x="685" y="116" text-anchor="middle" font-size="11" fill="#555">撤去工事の確認も</text>
</svg>
