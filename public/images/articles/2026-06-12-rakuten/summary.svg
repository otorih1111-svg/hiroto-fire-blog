<svg width="1200" height="460" viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="460" fill="#F7FBF8"/>
  
  <!-- タイトル -->
  <text x="600" y="35" font-size="28" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
    楽天経済圏で固定費が増えた流れ
  </text>
  
  <!-- 左側：気づくまでのステップ -->
  <g>
    <!-- ステップ1 -->
    <circle cx="100" cy="120" r="45" fill="#1F4D32"/>
    <text x="100" y="130" font-size="28" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">1</text>
    
    <rect x="20" y="175" width="160" height="60" fill="#7CB089" rx="5"/>
    <text x="100" y="200" font-size="13" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">固定費を見直し</text>
    <text x="100" y="218" font-size="11" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">月1万円以上削減</text>
    
    <!-- 矢印 -->
    <path d="M 100 245 L 100 280" stroke="#1F4D32" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- ステップ2 -->
    <circle cx="100" cy="310" r="45" fill="#1F4D32"/>
    <text x="100" y="320" font-size="28" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">2</text>
    
    <rect x="20" y="365" width="160" height="60" fill="#7CB089" rx="5"/>
    <text x="100" y="388" font-size="13" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">楽天経済圏へ</text>
    <text x="100" y="408" font-size="11" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">サービス追加開始</text>
  </g>
  
  <!-- 中央：サービス増加 -->
  <g>
    <!-- ステップ3 -->
    <circle cx="600" cy="120" r="45" fill="#1F4D32"/>
    <text x="600" y="130" font-size="28" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">3</text>
    
    <rect x="520" y="175" width="160" height="60" fill="#7CB089" rx="5"/>
    <text x="600" y="197" font-size="13" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">SPU還元率UP</text>
    <text x="600" y="215" font-size="11" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">のため課金増加</text>
    
    <!-- 矢印 -->
    <path d="M 600 245 L 600 280" stroke="#1F4D32" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- ステップ4 -->
    <circle cx="600" cy="310" r="45" fill="#1F4D32"/>
    <text x="600" y="320" font-size="28" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">4</text>
    
    <rect x="520" y="365" width="160" height="60" fill="#E8746B" rx="5"/>
    <text x="600" y="388" font-size="13" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">固定費が</text>
    <text x="600" y="408" font-size="13" font-weight="bold" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">戻ってくる</text>
  </g>
  
  <!-- 右側：具体的な金額 -->
  <g>
    <text x="1020" y="115" font-size="14" font-weight="bold" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      増えていた課金項目
    </text>
    
    <!-- 項目 -->
    <g>
      <rect x="920" y="135" width="240" height="25" fill="white" stroke="#7CB089" stroke-width="1" rx="3"/>
      <text x="930" y="153" font-size="11" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">楽天プレミアムカード：1,100円</text>
    </g>
    
    <g>
      <rect x="920" y="165" width="240" height="25" fill="white" stroke="#7CB089" stroke-width="1" rx="3"/>
      <text x="930" y="183" font-size="11" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">楽天ひかり：4,180円</text>
    </g>
    
    <g>
      <rect x="920" y="195" width="240" height="25" fill="white" stroke="#7CB089" stroke-width="1" rx="3"/>
      <text x="930" y="213" font-size="11" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">楽天マガジン：580円</text>
    </g>
    
    <g>
      <rect x="920" y="225" width="240" height="25" fill="white" stroke="#7CB089" stroke-width="1" rx="3"/>
      <text x="930" y="243" font-size="11" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">楽天ミュージック：980円</text>
    </g>
    
    <g>
      <rect x="920" y="255" width="240" height="25" fill="white" stroke="#7CB089" stroke-width="1" rx="3"/>
      <text x="930" y="273" font-size="11" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">その他オプション：数百円</text>
    </g>
    
    <!-- 合計 -->
    <g>
      <rect x="920" y="290" width="240" height="35" fill="#1F4D32" rx="3"/>
      <text x="930" y="308" font-size="11" font-weight="bold" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="white">合計：月5,000～6,000円</text>
      <text x="930" y="320" font-size="10" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#7CB089">（削減分がほぼ相殺）</text>
    </g>
    
    <!-- 警告テキスト -->
    <text x="1020" y="380" font-size="12" font-weight="bold" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#E8746B">
      ⚠ 見えにくい固定費
    </text>
    <text x="920" y="405" font-size="10" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      年払い、解約忘れ、
    </text>
    <text x="920" y="422" font-size="10" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" fill="#1F4D32">
      自動更新に要注意
    </text>
  </g>
  
  <!-- 矢印マーカー定義 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#1F4D32"/>
    </marker>
  </defs>
</svg>