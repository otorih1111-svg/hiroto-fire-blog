<svg width="1200" height="480" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="480" rx="32" fill="#F7FBF8"/>
  <rect x="56" y="48" width="1088" height="400" rx="28" fill="white" stroke="#D7E7DB" stroke-width="2"/>

  <text x="600" y="105" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="700" text-anchor="middle">「夜の1時間」と「朝の1時間」</text>
  <text x="600" y="138" fill="#5F6F65" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18" text-anchor="middle">同じ1時間でも、結果がまるで違った</text>

  <!-- 夜 -->
  <rect x="88" y="162" width="460" height="250" rx="20" fill="#FFF3F0" stroke="#F2C8C0" stroke-width="2"/>
  <text x="318" y="200" fill="#8A3021" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="700" text-anchor="middle">夜23時すぎ</text>
  <text x="118" y="240" fill="#8A5040" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18">皿洗い・明日の準備で力尽きる</text>
  <text x="118" y="275" fill="#8A5040" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18">パソコンを開いても何も思いつかない</text>
  <text x="118" y="310" fill="#8A5040" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18">15分ぼーっとして「もう無理」</text>
  <text x="118" y="345" fill="#8A5040" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18">そのまま閉じて寝る</text>
  <text x="118" y="388" fill="#C0392B" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="700">1ヶ月で書けた記事：3本</text>

  <!-- Arrow -->
  <path d="M572 287H628" stroke="#7CB089" stroke-width="10" stroke-linecap="round"/>
  <path d="M612 270L632 287L612 304" stroke="#7CB089" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 朝 -->
  <rect x="652" y="162" width="460" height="250" rx="20" fill="#F3F8F4" stroke="#9FC9AC" stroke-width="2"/>
  <text x="882" y="200" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="700" text-anchor="middle">朝5時25分</text>
  <text x="682" y="240" fill="#315C43" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18">部屋は静か。誰にも呼ばれない</text>
  <text x="682" y="275" fill="#315C43" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18">前夜に決めた作業から始める</text>
  <text x="682" y="310" fill="#315C43" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18">脳が動く。1時間で見出しが書き終わる</text>
  <text x="682" y="345" fill="#315C43" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18">息子が起きる前に少し前進できる</text>
  <text x="682" y="388" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="700">今日で90日以上継続中</text>

  <image href="/images/characters/hiroto/hiroto-character-surprised.png" x="1000" y="300" width="100" height="100"/>
</svg>
