<svg width="1200" height="480" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="480" rx="32" fill="#F7FBF8"/>
  <rect x="56" y="48" width="1088" height="400" rx="28" fill="white" stroke="#D7E7DB" stroke-width="2"/>

  <text x="600" y="105" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="30" font-weight="700" text-anchor="middle">朝5時25分〜6時25分のリアルな1時間</text>
  <text x="600" y="138" fill="#5F6F65" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18" text-anchor="middle">夜は3回失敗。今はこの流れで動いている</text>

  <!-- 夜の失敗バッジ -->
  <rect x="88" y="168" width="270" height="64" rx="16" fill="#FFF3F0" stroke="#F2C8C0" stroke-width="2"/>
  <text x="223" y="195" fill="#8A3021" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="15" font-weight="700" text-anchor="middle">夜23時すぎ → 3ヶ月で記事3本</text>
  <text x="223" y="220" fill="#8A5040" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="14" text-anchor="middle">「もう無理」で閉じて寝る日が続いた</text>

  <!-- タイムライン軸 -->
  <line x1="120" y1="320" x2="1080" y2="320" stroke="#9FC9AC" stroke-width="6" stroke-linecap="round"/>

  <!-- ノード1 -->
  <circle cx="160" cy="320" r="14" fill="#1F4D32"/>
  <text x="160" y="280" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="700" text-anchor="middle">5:25</text>
  <text x="160" y="360" fill="#315C43" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="15" text-anchor="middle">起床</text>
  <text x="160" y="382" fill="#5F6F65" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" text-anchor="middle">お湯を沸かす</text>

  <!-- ノード2 -->
  <circle cx="380" cy="320" r="14" fill="#1F4D32"/>
  <text x="380" y="280" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="700" text-anchor="middle">5:30</text>
  <text x="380" y="360" fill="#315C43" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="15" text-anchor="middle">PCを開く</text>
  <text x="380" y="382" fill="#5F6F65" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" text-anchor="middle">前夜のメモから始める</text>

  <!-- ノード3 -->
  <circle cx="600" cy="320" r="14" fill="#1F4D32"/>
  <text x="600" y="280" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="700" text-anchor="middle">5:40</text>
  <text x="600" y="360" fill="#315C43" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="15" text-anchor="middle">見出しを書く</text>
  <text x="600" y="382" fill="#5F6F65" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" text-anchor="middle">頭が一番動く時間</text>

  <!-- ノード4 -->
  <circle cx="820" cy="320" r="14" fill="#1F4D32"/>
  <text x="820" y="280" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="700" text-anchor="middle">6:10</text>
  <text x="820" y="360" fill="#315C43" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="15" text-anchor="middle">SNS文章を作る</text>
  <text x="820" y="382" fill="#5F6F65" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" text-anchor="middle">X・Threads分</text>

  <!-- ノード5 -->
  <circle cx="1040" cy="320" r="14" fill="#7CB089"/>
  <text x="1040" y="280" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="700" text-anchor="middle">6:25</text>
  <text x="1040" y="360" fill="#315C43" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="15" text-anchor="middle">息子が起きる</text>
  <text x="1040" y="382" fill="#5F6F65" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" text-anchor="middle">1日のスイッチ</text>

  <!-- 継続バッジ -->
  <rect x="842" y="168" width="270" height="64" rx="16" fill="#F3F8F4" stroke="#9FC9AC" stroke-width="2"/>
  <text x="977" y="195" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="15" font-weight="700" text-anchor="middle">今日で90日以上継続中</text>
  <text x="977" y="220" fill="#315C43" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="14" text-anchor="middle">記事数は64本に</text>
</svg>
