<svg xmlns="http://www.w3.org/2000/svg" width="440" height="446" viewBox="0 0 440 446" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect width="440" height="446" fill="#F6F8FA" rx="12"/>

  <text x="20" y="34" font-size="20" font-weight="bold" fill="#1F4D32">支出を3つに分けると、家計が見える</text>

  <!-- 固定費 -->
  <rect x="16" y="52" width="408" height="112" fill="#EAF4ED" rx="10"/>
  <rect x="16" y="52" width="7" height="112" fill="#1F4D32" rx="3"/>
  <text x="36" y="80" font-size="18" font-weight="bold" fill="#1F4D32">① 固定費</text>
  <text x="36" y="108" font-size="16" fill="#2C5F42">住宅ローン・光熱費・保険・サブスク</text>
  <text x="36" y="136" font-size="16" font-weight="bold" fill="#1F5637">やること：削れるものを探す</text>
  <text x="36" y="156" font-size="14.5" fill="#4A7A5C">一度やれば毎月効く</text>

  <!-- 変動費 -->
  <rect x="16" y="176" width="408" height="112" fill="#FBF4E6" rx="10"/>
  <rect x="16" y="176" width="7" height="112" fill="#B5872A" rx="3"/>
  <text x="36" y="204" font-size="18" font-weight="bold" fill="#7A5A14">② 変動費</text>
  <text x="36" y="232" font-size="16" fill="#8A6820">食費・外食・日用品・娯楽</text>
  <text x="36" y="260" font-size="16" font-weight="bold" fill="#7A5A14">やること：上限の目安を決める</text>
  <text x="36" y="280" font-size="14.5" fill="#9C8258">ゼロにはしない</text>

  <!-- 投資 -->
  <rect x="16" y="300" width="408" height="112" fill="#E8F2F7" rx="10"/>
  <rect x="16" y="300" width="7" height="112" fill="#1E6E93" rx="3"/>
  <text x="36" y="328" font-size="18" font-weight="bold" fill="#123A52">③ 投資</text>
  <text x="36" y="356" font-size="16" fill="#22536E">新NISAの積立額</text>
  <text x="36" y="384" font-size="16" font-weight="bold" fill="#123A52">やること：先取りで手をつけない</text>
  <text x="36" y="404" font-size="14.5" fill="#4A7690">給料日の翌日に自動で移す</text>

  <text x="20" y="436" font-size="14.5" fill="#6B7671">※金額はぼくの家計の実額です。家庭ごとに変わります。</text>
</svg>
