  </text>

  <rect x="96" y="220" width="500" height="320" rx="28" fill="#FFF7F2" stroke="#F2D9C8" stroke-width="2"/>
  <text x="136" y="276" fill="#8A4D21" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="700">
