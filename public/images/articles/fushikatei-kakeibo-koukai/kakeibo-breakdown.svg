  <path d="M626 380H766" stroke="#7CB089" stroke-width="12" stroke-linecap="round"/>
  <path d="M742 360L766 380L742 400" stroke="#7CB089" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="796" y="220" width="312" height="320" rx="28" fill="#F3F8F4" stroke="#CFE2D4" stroke-width="2"/>
  <text x="836" y="276" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="28" font-weight="700">
