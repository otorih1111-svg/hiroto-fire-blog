<svg xmlns="http://www.w3.org/2000/svg" width="440" height="486" viewBox="0 0 440 486" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect width="440" height="486" fill="#F5F9F6" rx="12"/>

  <text x="20" y="34" font-size="20" font-weight="bold" fill="#1F4D32">0歳から18歳まで、全部でいくら？</text>

  <!-- 内訳1 -->
  <rect x="16" y="52" width="408" height="80" fill="#FFFFFF" rx="10" stroke="#CFE3D6" stroke-width="1.5"/>
  <text x="36" y="80" font-size="17" font-weight="bold" fill="#24503A">3歳未満</text>
  <text x="36" y="108" font-size="16" fill="#4A7A5C">月15,000円 × 36ヶ月</text>
  <text x="404" y="99" text-anchor="end" font-size="22" font-weight="bold" fill="#1F4D32">54万円</text>

  <!-- 内訳2 -->
  <rect x="16" y="144" width="408" height="80" fill="#FFFFFF" rx="10" stroke="#CFE3D6" stroke-width="1.5"/>
  <text x="36" y="172" font-size="17" font-weight="bold" fill="#24503A">3歳〜高校生年代</text>
  <text x="36" y="200" font-size="16" fill="#4A7A5C">月10,000円 × 180ヶ月</text>
  <text x="404" y="191" text-anchor="end" font-size="22" font-weight="bold" fill="#1F4D32">180万円</text>

  <!-- 合計 -->
  <rect x="16" y="236" width="408" height="76" fill="#1F4D32" rx="10"/>
  <text x="36" y="266" font-size="17" font-weight="bold" fill="#EAF4ED">子ども1人あたりの合計</text>
  <text x="404" y="292" text-anchor="end" font-size="30" font-weight="bold" fill="#FFFFFF">234万円</text>

  <!-- 小4時点の残り -->
  <rect x="16" y="326" width="408" height="100" fill="#FFF6E5" rx="10"/>
  <rect x="16" y="326" width="7" height="100" fill="#C77E1B" rx="3"/>
  <text x="36" y="354" font-size="17" font-weight="bold" fill="#8A5A10">うちは小4。まだ残っている分は</text>
  <text x="36" y="390" font-size="26" font-weight="bold" fill="#C77E1B">約96万円</text>
  <text x="36" y="414" font-size="15" fill="#7A5210">月1万円 × 8年分。まだ間に合う</text>

  <text x="20" y="446" font-size="14.5" fill="#6B7671">※第3子以降は月30,000円。</text>
  <text x="20" y="464" font-size="14.5" fill="#6B7671">※2026年7月時点の制度にもとづく概算です。</text>
</svg>
