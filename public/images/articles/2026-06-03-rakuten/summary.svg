<svg width="1200" height="460" viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="460" fill="#F7FBF8"/>
  
  <!-- タイトル -->
  <text x="600" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    楽天経済圏で変わった固定費の構造
  </text>
  
  <!-- BEFORE セクション -->
  <g>
    <!-- BEFORE ラベル -->
    <rect x="40" y="70" width="240" height="40" fill="#1F4D32" rx="5"/>
    <text x="160" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="white" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      開始前
    </text>
    
    <!-- BEFORE ボックス -->
    <rect x="40" y="120" width="240" height="310" fill="white" stroke="#1F4D32" stroke-width="2" rx="5"/>
    
    <!-- 固定費項目 BEFORE -->
    <circle cx="60" cy="150" r="6" fill="#1F4D32"/>
    <text x="75" y="156" font-size="13" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      スマホ代
    </text>
    <text x="75" y="175" font-size="16" font-weight="bold" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月7,000円
    </text>
    
    <circle cx="60" cy="215" r="6" fill="#1F4D32"/>
    <text x="75" y="221" font-size="13" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      保険料
    </text>
    <text x="75" y="240" font-size="16" font-weight="bold" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月20,000円
    </text>
    
    <circle cx="60" cy="280" r="6" fill="#1F4D32"/>
    <text x="75" y="286" font-size="13" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      サブスク
    </text>
    <text x="75" y="305" font-size="16" font-weight="bold" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月1,710円
    </text>
    
    <line x1="60" y1="330" x2="240" y2="330" stroke="#7CB089" stroke-width="2"/>
    <text x="75" y="365" font-size="13" fill="#666" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月計：
    </text>
    <text x="75" y="385" font-size="18" font-weight="bold" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      約28,710円
    </text>
  </g>
  
  <!-- 矢印アイコン -->
  <g>
    <path d="M 330 260 L 380 260" stroke="#7CB089" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#7CB089"/>
      </marker>
    </defs>
  </g>
  
  <!-- AFTER セクション -->
  <g>
    <!-- AFTER ラベル -->
    <rect x="400" y="70" width="240" height="40" fill="#7CB089" rx="5"/>
    <text x="520" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="white" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      2年後
    </text>
    
    <!-- AFTER ボックス -->
    <rect x="400" y="120" width="240" height="310" fill="white" stroke="#7CB089" stroke-width="2" rx="5"/>
    
    <!-- 固定費項目 AFTER -->
    <circle cx="420" cy="150" r="6" fill="#7CB089"/>
    <text x="435" y="156" font-size="13" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      楽天モバイル
    </text>
    <text x="435" y="175" font-size="16" font-weight="bold" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月1,078円
    </text>
    
    <circle cx="420" cy="215" r="6" fill="#7CB089"/>
    <text x="435" y="221" font-size="13" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      保険料
    </text>
    <text x="435" y="240" font-size="16" font-weight="bold" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月13,000円
    </text>
    
    <circle cx="420" cy="280" r="6" fill="#7CB089"/>
    <text x="435" y="286" font-size="13" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      サブスク
    </text>
    <text x="435" y="305" font-size="16" font-weight="bold" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月980円
    </text>
    
    <line x1="420" y1="330" x2="600" y2="330" stroke="#7CB089" stroke-width="2"/>
    <text x="435" y="365" font-size="13" fill="#666" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月計：
    </text>
    <text x="435" y="385" font-size="18" font-weight="bold" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      約15,058円
    </text>
  </g>
  
  <!-- 削減額表示 -->
  <g>
    <!-- 背景ボックス -->
    <rect x="700" y="120" width="480" height="310" fill="#1F4D32" rx="5"/>
    
    <!-- タイトル -->
    <text x="940" y="155" font-size="16" font-weight="bold" text-anchor="middle" fill="white" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      固定費削減の内訳
    </text>
    
    <!-- 削減項目1 -->
    <circle cx="730" cy="200" r="5" fill="#7CB089"/>
    <text x="750" y="205" font-size="13" fill="white" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      通信費削減
    </text>
    <text x="750" y="225" font-size="20" font-weight="bold" fill="#7CB089" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      年 約84,000円
    </text>
    
    <!-- 削減項目2 -->
    <circle cx="730" cy="280" r="5" fill="#7CB089"/>
    <text x="750" y="285" font-size="13" fill="white" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      サブスク削減
    </text>
    <text x="750" y="305" font-size="20" font-weight="bold" fill="#7CB089" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      年 約8,760円
    </text>
    
    <!-- 削減項目3 -->
    <circle cx="730" cy="360" r="5" fill="#7CB089"/>
    <text x="750" y="365" font-size="13" fill="white" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      保険料削減
    </text>
    <text x="750" y="385" font-size="20" font-weight="bold" fill="#7CB089" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      年 約84,000円
    </text>
    
    <!-- 総削減額 -->
    <line x1="720" y1="405" x2="1150" y2="405" stroke="#7CB089" stroke-width="2"/>
    <text x="940" y="435" font-size="18" font-weight="bold" text-anchor="middle" fill="white" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月計削減額：約 13,650円 ／ 年間約 163,760円
    </text>
  </g>
</svg>