<svg width="1200" height="460" viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="460" fill="#F7FBF8"/>
  
  <!-- タイトル背景 -->
  <rect width="1200" height="60" fill="#1F4D32"/>
  <text x="600" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="white" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    新NISA投資前の家計整備 3ステップ
  </text>
  
  <!-- ステップ1 -->
  <g>
    <!-- 円形背景 -->
    <circle cx="150" cy="150" r="45" fill="#7CB089"/>
    <text x="150" y="160" font-size="36" font-weight="bold" text-anchor="middle" fill="white">①</text>
    
    <!-- ボックス -->
    <rect x="50" y="220" width="200" height="180" rx="8" fill="white" stroke="#7CB089" stroke-width="2"/>
    
    <!-- テキスト -->
    <text x="150" y="245" font-size="18" font-weight="bold" text-anchor="middle" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      支出を見える化
    </text>
    <line x1="60" y1="260" x2="240" y2="260" stroke="#7CB089" stroke-width="1"/>
    
    <text x="150" y="285" font-size="13" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      家計簿アプリで
    </text>
    <text x="150" y="305" font-size="13" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      銀行口座を連携
    </text>
    <text x="150" y="325" font-size="13" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      過去1ヶ月の支出を
    </text>
    <text x="150" y="345" font-size="13" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      データで確認
    </text>
    <text x="150" y="370" font-size="12" text-anchor="middle" fill="#7CB089" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-weight="bold">
      ▼ 意志より数字が大事
    </text>
  </g>
  
  <!-- 矢印1 -->
  <g>
    <line x1="260" y1="150" x2="340" y2="150" stroke="#1F4D32" stroke-width="3" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- ステップ2 -->
  <g>
    <!-- 円形背景 -->
    <circle cx="450" cy="150" r="45" fill="#7CB089"/>
    <text x="450" y="160" font-size="36" font-weight="bold" text-anchor="middle" fill="white">②</text>
    
    <!-- ボックス -->
    <rect x="350" y="220" width="200" height="180" rx="8" fill="white" stroke="#7CB089" stroke-width="2"/>
    
    <!-- テキスト -->
    <text x="450" y="245" font-size="18" font-weight="bold" text-anchor="middle" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      固定費を削る
    </text>
    <line x1="360" y1="260" x2="540" y2="260" stroke="#7CB089" stroke-width="1"/>
    
    <text x="450" y="285" font-size="12" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      スマホ料金
    </text>
    <text x="450" y="302" font-size="11" text-anchor="middle" fill="#666" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月 -5,922円
    </text>
    <text x="450" y="325" font-size="12" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      保険の整理
    </text>
    <text x="450" y="342" font-size="11" text-anchor="middle" fill="#666" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月 -11,000円
    </text>
    <text x="450" y="365" font-size="12" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      サブスク整理
    </text>
    <text x="450" y="382" font-size="11" text-anchor="middle" fill="#666" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      月 -3,500円
    </text>
    <text x="450" y="405" font-size="12" font-weight="bold" text-anchor="middle" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      合計：月 -20,422円
    </text>
  </g>
  
  <!-- 矢印2 -->
  <g>
    <line x1="560" y1="150" x2="640" y2="150" stroke="#1F4D32" stroke-width="3" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- ステップ3 -->
  <g>
    <!-- 円形背景 -->
    <circle cx="750" cy="150" r="45" fill="#7CB089"/>
    <text x="750" y="160" font-size="36" font-weight="bold" text-anchor="middle" fill="white">③</text>
    
    <!-- ボックス -->
    <rect x="650" y="220" width="200" height="180" rx="8" fill="white" stroke="#7CB089" stroke-width="2"/>
    
    <!-- テキスト -->
    <text x="750" y="245" font-size="18" font-weight="bold" text-anchor="middle" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      余った分で投資
    </text>
    <line x1="660" y1="260" x2="840" y2="260" stroke="#7CB089" stroke-width="1"/>
    
    <text x="750" y="285" font-size="13" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      確実に毎月余る
    </text>
    <text x="750" y="305" font-size="13" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      金額を把握してから
    </text>
    <text x="750" y="325" font-size="13" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      その一部で新NISA
    </text>
    <text x="750" y="345" font-size="13" text-anchor="middle" fill="#333" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
      積立を開始
    </text>
    <text x="750" y="370" font-size="12" text-anchor="middle" fill="#7CB089" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-weight="bold">
      ▼ 無理のない額を設定
    </text>
  </g>
  
  <!-- 注釈ボックス -->
  <rect x="900" y="140" width="270" height="290" rx="8" fill="#1F4D32" opacity="0.05" stroke="#1F4D32" stroke-width="2" stroke-dasharray="5,5"/>
  
  <text x="1035" y="165" font-size="16" font-weight="bold" text-anchor="middle" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    重要ポイント
  </text>
  <line x1="920" y1="175" x2="1050" y2="175" stroke="#1F4D32" stroke-width="2"/>
  
  <circle cx="915" cy="200" r="3" fill="#7CB089"/>
  <text x="930" y="205" font-size="12" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    順番が大事
  </text>
  
  <circle cx="915" cy="235" r="3" fill="#7CB089"/>
  <text x="930" y="240" font-size="12" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    固定費は意志力不要
  </text>
  
  <circle cx="915" cy="270" r="3" fill="#7CB089"/>
  <text x="930" y="275" font-size="12" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    無理のない額が続く
  </text>
  
  <circle cx="915" cy="305" r="3" fill="#7CB089"/>
  <text x="930" y="310" font-size="12" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    穴の空いたバケツに
  </text>
  <text x="930" y="325" font-size="12" fill="#1F4D32" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    水は注げない
  </text>
  
  <!-- 矢印定義 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1F4D32"/>
    </marker>
  </defs>
</svg>