<svg xmlns="http://www.w3.org/2000/svg" width="440" height="452" viewBox="0 0 440 452" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect width="440" height="452" fill="#F6F8FA" rx="12"/>

  <text x="20" y="34" font-size="20" font-weight="bold" fill="#123A52">選ぶ基準は「読み切れるか」だけ</text>

  <!-- カード1 -->
  <rect x="16" y="52" width="408" height="176" fill="#E8F2F7" rx="10"/>
  <rect x="16" y="52" width="7" height="176" fill="#1E6E93" rx="3"/>
  <text x="36" y="80" font-size="18" font-weight="bold" fill="#123A52">普通の人が資産運用で</text>
  <text x="36" y="102" font-size="18" font-weight="bold" fill="#123A52">99点をとる方法とその考え方</text>
  <text x="36" y="138" font-size="26" font-weight="bold" fill="#1E6E93">152ページ</text>
  <text x="36" y="166" font-size="17" fill="#22536E">新NISAを始めたいだけの人へ</text>
  <text x="36" y="194" font-size="15" fill="#4A7690">第1部がいきなり「結論編」</text>
  <text x="36" y="216" font-size="15" fill="#4A7690">年間30分で終わる方法として書かれた本</text>

  <!-- カード2 -->
  <rect x="16" y="240" width="408" height="150" fill="#FBF1E6" rx="10"/>
  <rect x="16" y="240" width="7" height="150" fill="#B5762A" rx="3"/>
  <text x="36" y="270" font-size="19" font-weight="bold" fill="#6E4514">改訂版 お金の大学</text>
  <text x="36" y="300" font-size="26" font-weight="bold" fill="#B5762A">324ページ</text>
  <text x="36" y="328" font-size="17" fill="#7A5220">家計ごと立て直したい人へ</text>
  <text x="36" y="356" font-size="15" fill="#94693A">固定費・保険・投資を1冊で網羅</text>
  <text x="36" y="378" font-size="15" fill="#94693A">辞書として置いておく使い方</text>

  <text x="20" y="420" font-size="14.5" fill="#63737E">※結論はどちらも同じ。長期で積み立てるだけ。</text>
  <text x="20" y="438" font-size="14.5" fill="#63737E">※違うのは、そこへ行くまでの道の長さです。</text>
</svg>
