<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif">

  <rect width="680" height="300" rx="12" fill="#F8FAF8"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1F4D32">楽天証券 vs SBI証券：楽天経済圏ユーザーの場合</text>

  <!-- Rakuten column -->
  <rect x="32" y="52" width="290" height="220" rx="10" fill="#EAF4ED" stroke="#7CB089" stroke-width="1.5"/>
  <rect x="32" y="52" width="290" height="44" rx="10" fill="#1F4D32"/>
  <rect x="32" y="84" width="290" height="12" fill="#1F4D32"/>
  <text x="177" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="white">楽天証券</text>

  <text x="177" y="118" text-anchor="middle" font-size="12" fill="#333">クレカ積立：楽天カード</text>
  <text x="177" y="140" text-anchor="middle" font-size="12" fill="#333">銀行連携：楽天銀行（マネーブリッジ）</text>
  <text x="177" y="162" text-anchor="middle" font-size="12" fill="#333">ポイント：楽天ポイント</text>
  <text x="177" y="184" text-anchor="middle" font-size="12" fill="#333">楽天市場・モバイルとSPU連携</text>

  <!-- Badge -->
  <rect x="72" y="234" width="210" height="28" rx="14" fill="#1F4D32"/>
  <text x="177" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="white">楽天経済圏ユーザーに◎</text>

  <!-- SBI column -->
  <rect x="358" y="52" width="290" height="220" rx="10" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="1.5"/>
  <rect x="358" y="52" width="290" height="44" rx="10" fill="#666"/>
  <rect x="358" y="84" width="290" height="12" fill="#666"/>
  <text x="503" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="white">SBI証券</text>

  <text x="503" y="118" text-anchor="middle" font-size="12" fill="#333">クレカ積立：三井住友カード</text>
  <text x="503" y="140" text-anchor="middle" font-size="12" fill="#333">銀行連携：SBIネット銀行</text>
  <text x="503" y="162" text-anchor="middle" font-size="12" fill="#333">ポイント：Vポイント等</text>
  <text x="503" y="184" text-anchor="middle" font-size="12" fill="#333">iDeCo・銘柄数が充実</text>

  <!-- Badge -->
  <rect x="398" y="234" width="210" height="28" rx="14" fill="#888"/>
  <text x="503" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="white">三井住友カードユーザーに◎</text>

</svg>
