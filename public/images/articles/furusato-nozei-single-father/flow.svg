<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif">
  <rect width="720" height="320" fill="#f8fafb" rx="12"/>

  <text x="360" y="40" text-anchor="middle" fill="#333" font-size="17" font-weight="bold">ふるさと納税、ぼくがやった3ステップ</text>

  <!-- Step1 -->
  <rect x="30" y="70" width="190" height="200" fill="#fff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="30" y="70" width="190" height="40" fill="#2d7a4f" rx="10"/>
  <rect x="30" y="92" width="190" height="18" fill="#2d7a4f"/>
  <text x="125" y="96" text-anchor="middle" fill="white" font-size="14" font-weight="bold">STEP1</text>
  <text x="125" y="140" text-anchor="middle" fill="#333" font-size="13">控除上限額を</text>
  <text x="125" y="160" text-anchor="middle" fill="#333" font-size="13">シミュレーターで確認</text>
  <text x="125" y="195" text-anchor="middle" fill="#888" font-size="11">年収・家族構成を</text>
  <text x="125" y="212" text-anchor="middle" fill="#888" font-size="11">入力するだけ</text>
  <text x="125" y="248" text-anchor="middle" fill="#2d7a4f" font-size="12">所要時間：5分</text>

  <!-- arrow -->
  <text x="245" y="180" text-anchor="middle" fill="#2d7a4f" font-size="22">→</text>

  <!-- Step2 -->
  <rect x="265" y="70" width="190" height="200" fill="#fff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="265" y="70" width="190" height="40" fill="#2d7a4f" rx="10"/>
  <rect x="265" y="92" width="190" height="18" fill="#2d7a4f"/>
  <text x="360" y="96" text-anchor="middle" fill="white" font-size="14" font-weight="bold">STEP2</text>
  <text x="360" y="140" text-anchor="middle" fill="#333" font-size="13">サイトで返礼品を選び</text>
  <text x="360" y="160" text-anchor="middle" fill="#333" font-size="13">寄付を申し込む</text>
  <text x="360" y="195" text-anchor="middle" fill="#888" font-size="11">普段の通販と</text>
  <text x="360" y="212" text-anchor="middle" fill="#888" font-size="11">同じ操作感</text>
  <text x="360" y="248" text-anchor="middle" fill="#2d7a4f" font-size="12">所要時間：15分</text>

  <!-- arrow -->
  <text x="480" y="180" text-anchor="middle" fill="#2d7a4f" font-size="22">→</text>

  <!-- Step3 -->
  <rect x="500" y="70" width="190" height="200" fill="#fff" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="500" y="70" width="190" height="40" fill="#2d7a4f" rx="10"/>
  <rect x="500" y="92" width="190" height="18" fill="#2d7a4f"/>
  <text x="595" y="96" text-anchor="middle" fill="white" font-size="14" font-weight="bold">STEP3</text>
  <text x="595" y="140" text-anchor="middle" fill="#333" font-size="13">ワンストップ特例の</text>
  <text x="595" y="160" text-anchor="middle" fill="#333" font-size="13">申請書を返送する</text>
  <text x="595" y="195" text-anchor="middle" fill="#888" font-size="11">確定申告なしで</text>
  <text x="595" y="212" text-anchor="middle" fill="#888" font-size="11">完結（5自治体まで）</text>
  <text x="595" y="248" text-anchor="middle" fill="#2d7a4f" font-size="12">所要時間：10分×自治体数</text>

  <rect x="190" y="288" width="340" height="26" fill="#e8f5ee" rx="6"/>
  <text x="360" y="306" text-anchor="middle" fill="#2d7a4f" font-size="13" font-weight="bold">合計：休日の昼休みでぜんぶ終わる量</text>
</svg>
